services:
  - type: web
    name: chattttbot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: chattttbot-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: AI_PROVIDER
        value: openrouter
      - key: AI_MODEL
        value: google/gemini-2.5-flash
      - key: AI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: AI_TIMEOUT_SECONDS
        value: 30
      - key: AI_MAX_INPUT_TOKENS
        value: 8192
      - key: AI_MAX_OUTPUT_TOKENS
        value: 2048
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your Vercel URL after frontend deploy

databases:
  - name: chattttbot-db
    plan: free
    databaseName: chattttbot
    user: chattttbot_user
